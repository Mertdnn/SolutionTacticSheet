<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CS2 Taktik Defteri</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#e8e8e8;min-height:100vh;padding:1.5rem}
.screen{display:none}
.screen.active{display:block}
h1{font-size:22px;font-weight:500;margin-bottom:4px;color:#fff}
.sub{font-size:14px;color:#888;margin-bottom:1.5rem}
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.map-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;transition:border-color 0.15s}
.map-card:hover{border-color:#444}
.map-thumb{height:90px;width:100%;object-fit:cover;display:block}
.map-label{font-size:14px;font-weight:500;padding:10px 14px 8px;color:#ccc}
.side-row{display:flex;gap:10px;padding:0 14px 14px}
.side-btn{flex:1;padding:10px 0;font-size:14px;font-weight:600;border:1.5px solid;border-radius:8px;cursor:pointer;background:transparent;transition:background 0.15s}
.side-btn.ct{color:#5b9bd5;border-color:#5b9bd5}
.side-btn.ct:hover{background:rgba(91,155,213,0.15)}
.side-btn.t{color:#d4943a;border-color:#d4943a}
.side-btn.t:hover{background:rgba(212,148,58,0.15)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.5rem}
.back-btn:hover{color:#ccc}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:#888;margin-bottom:1.5rem;flex-wrap:wrap}
.breadcrumb strong{color:#fff;font-weight:500}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.badge.ct{background:rgba(91,155,213,0.2);color:#5b9bd5}
.badge.t{background:rgba(212,148,58,0.2);color:#d4943a}
.round-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
.round-grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:2rem}
.round-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:1.25rem 1rem;text-align:center;cursor:pointer;transition:border-color 0.15s}
.round-card:hover{border-color:#555}
.round-icon{font-size:26px;color:#888;margin-bottom:8px}
.round-name{font-size:15px;font-weight:500;color:#ddd}
.round-desc{font-size:11px;color:#666;margin-top:3px}
.section-title{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.tactic-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:8px}
.tactic-text{flex:1;font-size:14px;line-height:1.5;font-weight:500}
.del-btn{background:none;border:none;cursor:pointer;color:#444;font-size:18px;line-height:1;padding:0 2px;transition:color 0.15s;flex-shrink:0}
.del-btn:hover{color:#e24b4a}
.edit-btn{background:none;border:none;cursor:pointer;color:#444;font-size:18px;line-height:1;padding:0 2px;transition:color 0.15s;flex-shrink:0}
.edit-btn:hover{color:#5b9bd5}
.tactic-edit-input{flex:1;padding:6px 10px;font-size:14px;border:1px solid #555;border-radius:6px;background:#111;color:#e8e8e8;outline:none}
.empty-state{text-align:center;padding:2.5rem 1rem;color:#555;font-size:14px}
.empty-state i{font-size:28px;display:block;margin-bottom:8px;color:#444}

/* Add row with color picker */
.add-row{display:flex;gap:8px;margin-top:1rem;align-items:center;flex-wrap:wrap}
.add-row input{flex:1;min-width:0;padding:10px 13px;font-size:14px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e8e8e8;outline:none;transition:border-color 0.15s}
.add-row input:focus{border-color:#555}
.add-row input::placeholder{color:#555}
.add-row button.add-main-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;font-size:14px;border:1px solid #444;border-radius:8px;background:transparent;color:#ccc;cursor:pointer;transition:background 0.15s,color 0.15s;white-space:nowrap}
.add-row button.add-main-btn:hover{background:#2a2a2a;color:#fff}
.add-row button.add-main-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Color palette */
.color-palette{display:flex;gap:6px;align-items:center;flex-shrink:0}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;flex-shrink:0}
.color-dot:hover{transform:scale(1.15)}
.color-dot.selected{border-color:#fff;transform:scale(1.15)}

/* Title items */
.title-item{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.title-item:hover{border-color:#444;background:#1e1e1e}
.title-name{flex:1;font-size:15px;font-weight:500;color:#ddd}
.title-count{font-size:11px;color:#555;white-space:nowrap}

#s-login{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:2rem;width:100%;max-width:320px;text-align:center}
.login-box h2{font-size:18px;font-weight:500;color:#fff;margin-bottom:6px}
.login-box p{font-size:13px;color:#666;margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 14px;font-size:15px;border:1px solid #333;border-radius:8px;background:#111;color:#e8e8e8;outline:none;text-align:center;letter-spacing:0.1em;margin-bottom:10px}
.login-box input:focus{border-color:#555}
.login-box button{width:100%;padding:10px;font-size:14px;border:1px solid #444;border-radius:8px;background:transparent;color:#ccc;cursor:pointer;transition:background 0.15s}
.login-box button:hover{background:#2a2a2a;color:#fff}
.login-error{font-size:12px;color:#e24b4a;margin-top:8px;min-height:18px}
.loading{text-align:center;padding:2rem;color:#555;font-size:14px}
.saving-indicator{font-size:12px;color:#555;margin-top:6px;min-height:16px}

/* Color label hint */
.color-hint{font-size:11px;color:#555;margin-top:6px}
</style>
</head>
<body>

<div id="s-login">
  <div class="login-box">
    <h2>Solution Taktik Defteri</h2>
    <p>Devam etmek için takım şifresini gir</p>
    <input id="password-input" type="password" placeholder="Şifre"/>
    <button onclick="checkPassword()">Giriş</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="s-maps" class="screen">
  <h1>Solution taktik defteri</h1>
  <p class="sub">Bir harita seç</p>
  <div class="map-grid" id="map-grid"></div>
</div>

<div id="s-round" class="screen">
  <button class="back-btn" onclick="goMaps()"><i class="ti ti-arrow-left"></i> Haritalar</button>
  <div class="breadcrumb" id="bc-round"></div>
  <div class="round-grid-4">
    <div class="round-card" onclick="goDefaultTitles()">
      <div class="round-icon"><i class="ti ti-star"></i></div>
      <div class="round-name">Default</div>
      <div class="round-desc">Genel taktikler</div>
    </div>
    <div class="round-card" onclick="goSubtypeScreen('Pistol')">
      <div class="round-icon"><i class="ti ti-target"></i></div>
      <div class="round-name">Pistol</div>
      <div class="round-desc">1. ve 13. round</div>
    </div>
    <div class="round-card" onclick="goSubtypeScreen('Eco')">
      <div class="round-icon"><i class="ti ti-coin"></i></div>
      <div class="round-name">Eco</div>
      <div class="round-desc">Tasarruf roundları</div>
    </div>
    <div class="round-card" onclick="goSubtypeScreen('Full Buy')">
      <div class="round-icon"><i class="ti ti-shield"></i></div>
      <div class="round-name">Full Buy</div>
      <div class="round-desc">Tam ekipman</div>
    </div>
  </div>
</div>

<div id="s-subtype" class="screen">
  <button class="back-btn" onclick="goRound()"><i class="ti ti-arrow-left"></i> Round tipleri</button>
  <div class="breadcrumb" id="bc-subtype"></div>
  <div class="round-grid">
    <div class="round-card" onclick="goTitles('Execute')">
      <div class="round-icon"><i class="ti ti-bolt"></i></div>
      <div class="round-name">Execute</div>
      <div class="round-desc">Organize giriş</div>
    </div>
    <div class="round-card" onclick="goTitles('Slow')">
      <div class="round-icon"><i class="ti ti-hourglass"></i></div>
      <div class="round-name">Slow</div>
      <div class="round-desc">Kontrollü oyun</div>
    </div>
    <div class="round-card" onclick="goTitles('Fast')">
      <div class="round-icon"><i class="ti ti-flame"></i></div>
      <div class="round-name">Fast</div>
      <div class="round-desc">Hızlı rush</div>
    </div>
  </div>
</div>

<!-- Taktik başlıkları listesi -->
<div id="s-titles" class="screen">
  <button class="back-btn" id="titles-back-btn"><i class="ti ti-arrow-left"></i> Geri</button>
  <div class="breadcrumb" id="bc-titles"></div>
  <div class="section-title">Taktikler</div>
  <div id="title-list"></div>
  <div class="add-row">
    <input id="new-title" type="text" placeholder="Yeni taktik adı..." maxlength="100"/>
    <button class="add-main-btn" id="add-title-btn" onclick="addTitle()"><i class="ti ti-plus"></i> Ekle</button>
  </div>
  <div class="saving-indicator" id="saving-indicator-titles"></div>
</div>

<!-- Taktik adımları ekranı -->
<div id="s-tactics" class="screen">
  <button class="back-btn" onclick="goTitlesBack()"><i class="ti ti-arrow-left"></i> Taktikler</button>
  <div class="breadcrumb" id="bc-tactics"></div>
  <div class="section-title">Adımlar</div>
  <div id="tactic-list"></div>

  <!-- Renk paleti + input -->
  <div class="add-row" style="margin-top:1.25rem">
    <div class="color-palette" id="color-palette"></div>
  </div>
  <div class="add-row" style="margin-top:8px">
    <input id="new-tactic" type="text" placeholder="Yeni adım ekle..." maxlength="200"/>
    <button class="add-main-btn" id="add-btn" onclick="addTactic()"><i class="ti ti-plus"></i> Ekle</button>
  </div>
  <div class="color-hint" id="color-hint">Renk seçili: —</div>
  <div class="saving-indicator" id="saving-indicator"></div>
</div>

<script>
var JSONBIN_API_KEY = "$2a$10$4/P.gAt.4e9nOFehuOgcwu7q281ottYiWhYTLaNwe0gR2u1X.ijAO";
var JSONBIN_BIN_ID  = "6a2d1b7ff5f4af5e29eaed43";
var TAKIM_SIFRESI  = "zubub";

// CS2 oyuncu renkleri
var CS2_COLORS = [
  {name:"Turuncu",  hex:"#f4a233"},
  {name:"Yeşil",    hex:"#4ece5d"},
  {name:"Sarı",     hex:"#e8d84b"},
  {name:"Mavi",     hex:"#5b9bd5"},
  {name:"Mor",      hex:"#b05bd5"},
  {name:"Kırmızı",  hex:"#e24b4a"},
  {name:"Açık Mavi",hex:"#4bc4e2"},
  {name:"Pembe",    hex:"#e26ca0"},
  {name:"Beyaz",    hex:"#e8e8e8"}
];

var selColor = CS2_COLORS[0].hex; // varsayılan: turuncu

var MAPS=[
  {id:"Anubis",  img:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/wAARCACzARoDASIAAhEBAxEB/8QAFgABAQEAAAAAAAAAAAAAAAAABAMC/8QAGxABAQEBAQEBAAAAAAAAAAAAAAERAiIxQf/aAAwDAQACEQMRAD8A1LttBpV2lZLLWqk2mmmgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"},
  {id:"Inferno", img:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/wAARCAC/ASwDASIAAhEBAxEB/8QAFgABAQEAAAAAAAAAAAAAAAAABAMC/8QAGxABAQEBAQEBAAAAAAAAAAAAAAERAiIxQf/aAAwDAQACEQMRAD8A1LttBpV2lZLLWqk2mmmgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"},
  {id:"Dust II",  img:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/wAARCACoASwDASIAAhEBAxEB/8QAFgABAQEAAAAAAAAAAAAAAAAABAMC/8QAGxABAQEBAQEBAAAAAAAAAAAAAAERAiIxQf/aAAwDAQACEQMRAD8A1LttBpV2lZLLWqk2mmmgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"},
  {id:"Cache",   img:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/wAARCACpASoDASIAAhEBAxEB/8QAFgABAQEAAAAAAAAAAAAAAAAABAMC/8QAGxABAQEBAQEBAAAAAAAAAAAAAAERAiIxQf/aAAwDAQACEQMRAD8A1LttBpV2lZLLWqk2mmmgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}
];

var selMap="", selSide="", selRound="", selSubtype="", selTitle="";
var globalData={taktikler:{}};
var saving=false;
var editingIndex=-1;

// ─── Auth ───────────────────────────────────────────────
function checkPassword(){
  var val=document.getElementById("password-input").value;
  if(val===TAKIM_SIFRESI){
    document.getElementById("s-login").style.display="none";
    init();
  } else {
    document.getElementById("login-error").innerText="Yanlış şifre, tekrar dene.";
  }
}
document.getElementById("password-input").addEventListener("keydown",function(e){if(e.key==="Enter")checkPassword()});

// ─── Cloud ──────────────────────────────────────────────
function apiHeaders(){return{"Content-Type":"application/json","X-Master-Key":JSONBIN_API_KEY,"X-Bin-Meta":"false"}}
function loadFromCloud(cb){
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN_ID+"/latest",{headers:apiHeaders()})
    .then(function(r){return r.json()})
    .then(function(d){globalData=d&&d.taktikler?d:{taktikler:{}};cb()})
    .catch(function(){globalData={taktikler:{}};cb()});
}
function saveToCloud(cb){
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN_ID,{
    method:"PUT",headers:apiHeaders(),body:JSON.stringify(globalData)
  }).then(function(){if(cb)cb()}).catch(function(){if(cb)cb()});
}

// ─── Keys ───────────────────────────────────────────────
function titleKey(m,s,r,sub){return m+"||"+s+"||"+r+"||"+sub+"||__titles__"}
function tacticKey(m,s,r,sub,title){return m+"||"+s+"||"+r+"||"+sub+"||"+title}
function getTitleList(m,s,r,sub){return globalData.taktikler[titleKey(m,s,r,sub)]||[]}
function setTitleList(m,s,r,sub,arr){globalData.taktikler[titleKey(m,s,r,sub)]=arr}
function getTactics(m,s,r,sub,title){return globalData.taktikler[tacticKey(m,s,r,sub,title)]||[]}
function setTactics(m,s,r,sub,title,arr){globalData.taktikler[tacticKey(m,s,r,sub,title)]=arr}

// ─── Color palette ──────────────────────────────────────
function buildPalette(){
  var el=document.getElementById("color-palette");
  el.innerHTML=CS2_COLORS.map(function(c,i){
    return '<div class="color-dot'+(c.hex===selColor?" selected":"")+'" title="'+c.name+'" style="background:'+c.hex+'" onclick="pickColor(\''+c.hex+'\',\''+c.name+'\','+i+')"></div>';
  }).join("");
}
function pickColor(hex,name,idx){
  selColor=hex;
  document.querySelectorAll(".color-dot").forEach(function(d,i){
    d.classList.toggle("selected",i===idx);
  });
  document.getElementById("color-hint").innerText="Renk seçili: "+name;
}

// ─── Navigation ─────────────────────────────────────────
function init(){renderMaps();show("s-maps")}
function show(id){
  ["s-maps","s-round","s-subtype","s-titles","s-tactics"].forEach(function(s){
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
function goMaps(){show("s-maps")}
function goRound(){show("s-round")}
function goSubtype(){show("s-subtype")}

function renderMaps(){
  var g=document.getElementById("map-grid");
  g.innerHTML=MAPS.map(function(m){
    return '<div class="map-card">'+
      '<img class="map-thumb" src="'+m.img+'" alt="'+m.id+'" style="height:90px;width:100%;object-fit:cover;display:block"/>'+
      '<div class="map-label" style="font-size:14px;font-weight:500;padding:10px 14px 8px;color:#ccc">'+m.id+'</div>'+
      '<div class="side-row">'+
        '<button class="side-btn ct" onclick="goRoundScreen(\''+m.id+'\',\'CT\')">CT</button>'+
        '<button class="side-btn t"  onclick="goRoundScreen(\''+m.id+'\',\'T\')">T</button>'+
      '</div>'+
    '</div>';
  }).join("");
}

function goRoundScreen(map,side){
  selMap=map; selSide=side;
  document.getElementById("bc-round").innerHTML=
    '<strong>'+map+'</strong> <span class="badge '+(side==="CT"?"ct":"t")+'">'+side+'</span>';
  loadFromCloud(function(){});
  show("s-round");
}

function goSubtypeScreen(round){
  selRound=round;
  document.getElementById("bc-subtype").innerHTML=
    '<strong>'+selMap+'</strong> <span class="badge '+(selSide==="CT"?"ct":"t")+'">'+selSide+'</span> — '+round;
  show("s-subtype");
}

// Default: subtype ekranını atla, direkt başlıklara git
function goDefaultTitles(){
  selRound="Default";
  selSubtype="";
  document.getElementById("bc-titles").innerHTML=
    '<strong>'+selMap+'</strong> <span class="badge '+(selSide==="CT"?"ct":"t")+'">'+selSide+'</span> — Default';
  // Geri tuşu round ekranına dönsün
  document.getElementById("titles-back-btn").onclick = function(){ goRound(); };
  document.getElementById("title-list").innerHTML='<div class="loading">Yükleniyor...</div>';
  document.getElementById("saving-indicator-titles").innerText="";
  show("s-titles");
  loadFromCloud(function(){renderTitles()});
}

function goTitles(subtype){
  selSubtype=subtype;
  document.getElementById("bc-titles").innerHTML=
    '<strong>'+selMap+'</strong> <span class="badge '+(selSide==="CT"?"ct":"t")+'">'+selSide+'</span> — '+selRound+' — '+subtype;
  // Geri tuşu subtype ekranına dönsün
  document.getElementById("titles-back-btn").onclick = function(){ goSubtype(); };
  document.getElementById("title-list").innerHTML='<div class="loading">Yükleniyor...</div>';
  document.getElementById("saving-indicator-titles").innerText="";
  show("s-titles");
  loadFromCloud(function(){renderTitles()});
}

// ─── Titles ─────────────────────────────────────────────
function renderTitles(){
  var arr=getTitleList(selMap,selSide,selRound,selSubtype);
  var el=document.getElementById("title-list");
  if(arr.length===0){
    el.innerHTML='<div class="empty-state"><i class="ti ti-notes-off"></i>Henüz taktik eklenmemiş</div>';
    return;
  }
  el.innerHTML=arr.map(function(t,i){
    var steps=getTactics(selMap,selSide,selRound,selSubtype,t);
    var cnt=steps.length;
    return '<div class="title-item" onclick="openTitle(\''+escAttr(t)+'\')">'+
      '<i class="ti ti-folder" style="font-size:18px;color:#888;flex-shrink:0"></i>'+
      '<span class="title-name">'+escHtml(t)+'</span>'+
      '<span class="title-count">'+cnt+' adım</span>'+
      '<button class="del-btn" onclick="event.stopPropagation();deleteTitle('+i+')" title="Sil"><i class="ti ti-trash"></i></button>'+
    '</div>';
  }).join("");
}

function addTitle(){
  var inp=document.getElementById("new-title");
  var val=inp.value.trim();
  if(!val||saving)return;
  saving=true; setSavingTitles(true);
  var arr=getTitleList(selMap,selSide,selRound,selSubtype);
  if(arr.indexOf(val)>-1){saving=false;setSavingTitles(false);alert("Bu isimde bir taktik zaten var.");return;}
  arr.push(val);
  setTitleList(selMap,selSide,selRound,selSubtype,arr);
  inp.value="";
  renderTitles();
  saveToCloud(function(){saving=false;setSavingTitles(false)});
}

function deleteTitle(i){
  if(saving)return;
  saving=true; setSavingTitles(true);
  var arr=getTitleList(selMap,selSide,selRound,selSubtype);
  arr.splice(i,1);
  setTitleList(selMap,selSide,selRound,selSubtype,arr);
  renderTitles();
  saveToCloud(function(){saving=false;setSavingTitles(false)});
}

function setSavingTitles(active){
  var ind=document.getElementById("saving-indicator-titles");
  var btn=document.getElementById("add-title-btn");
  if(active){ind.innerText="Kaydediliyor...";btn.disabled=true;}
  else{ind.innerText="Kaydedildi ✓";btn.disabled=false;setTimeout(function(){ind.innerText=""},2000);}
}

document.getElementById("new-title").addEventListener("keydown",function(e){if(e.key==="Enter")addTitle()});

// ─── Tactic steps ───────────────────────────────────────
function goTitlesBack(){
  editingIndex=-1;
  // Default ise round ekranına, değilse subtype ekranına dön
  if(selRound==="Default"){
    goRound();
  } else {
    goSubtype();
    show("s-titles");
    renderTitles();
  }
}

function openTitle(title){
  selTitle=title;
  editingIndex=-1;
  var subtypePart = selSubtype ? ' — '+selSubtype : '';
  document.getElementById("bc-tactics").innerHTML=
    '<strong>'+selMap+'</strong> <span class="badge '+(selSide==="CT"?"ct":"t")+'">'+selSide+'</span>'
    +' — '+selRound+subtypePart+' — <strong style="color:#fff">'+escHtml(title)+'</strong>';
  document.getElementById("saving-indicator").innerText="";
  buildPalette();
  document.getElementById("color-hint").innerText="Renk seçili: "+CS2_COLORS.find(function(c){return c.hex===selColor}).name;
  show("s-tactics");
  renderTactics();
}

function renderTactics(){
  var arr=getTactics(selMap,selSide,selRound,selSubtype,selTitle);
  var el=document.getElementById("tactic-list");
  if(arr.length===0 && editingIndex===-1){
    el.innerHTML='<div class="empty-state"><i class="ti ti-notes-off"></i>Henüz adım eklenmemiş</div>';
    return;
  }
  el.innerHTML=arr.map(function(t,i){
    // t can be string (legacy) or {text, color}
    var text  = typeof t === "object" ? t.text  : t;
    var color = typeof t === "object" ? t.color : "#e8e8e8";
    if(i===editingIndex){
      return '<div class="tactic-item">'+
        '<input class="tactic-edit-input" id="edit-input" type="text" value="'+escAttr(text)+'"/>'+
        '<button class="edit-btn" onclick="saveEdit('+i+')" title="Kaydet"><i class="ti ti-check"></i></button>'+
        '<button class="del-btn" onclick="cancelEdit()" title="Vazgeç"><i class="ti ti-x"></i></button>'+
      '</div>';
    }
    return '<div class="tactic-item">'+
      '<i class="ti ti-arrow-right" style="font-size:16px;color:'+color+';margin-top:2px;flex-shrink:0"></i>'+
      '<span class="tactic-text" style="color:'+color+'">'+escHtml(text)+'</span>'+
      '<button class="edit-btn" onclick="editTactic('+i+')" title="Düzenle"><i class="ti ti-pencil"></i></button>'+
      '<button class="del-btn" onclick="deleteTactic('+i+')" title="Sil"><i class="ti ti-trash"></i></button>'+
    '</div>';
  }).join("");
  if(editingIndex>-1){
    var inp=document.getElementById("edit-input");
    inp.focus();
    inp.addEventListener("keydown",function(e){
      if(e.key==="Enter")saveEdit(editingIndex);
      if(e.key==="Escape")cancelEdit();
    });
  }
}

function addTactic(){
  var inp=document.getElementById("new-tactic");
  var val=inp.value.trim();
  if(!val||saving)return;
  saving=true; setSaving(true);
  var arr=getTactics(selMap,selSide,selRound,selSubtype,selTitle);
  arr.push({text:val, color:selColor});
  setTactics(selMap,selSide,selRound,selSubtype,selTitle,arr);
  inp.value="";
  renderTactics();
  saveToCloud(function(){saving=false;setSaving(false)});
}

function editTactic(i){editingIndex=i;renderTactics()}
function cancelEdit(){editingIndex=-1;renderTactics()}

function saveEdit(i){
  var val=document.getElementById("edit-input").value.trim();
  if(!val||saving)return;
  saving=true; setSaving(true);
  var arr=getTactics(selMap,selSide,selRound,selSubtype,selTitle);
  var old=arr[i];
  var oldColor=typeof old==="object"?old.color:"#e8e8e8";
  arr[i]={text:val, color:oldColor};
  setTactics(selMap,selSide,selRound,selSubtype,selTitle,arr);
  editingIndex=-1;
  renderTactics();
  saveToCloud(function(){saving=false;setSaving(false)});
}

function deleteTactic(i){
  if(saving)return;
  saving=true; setSaving(true);
  var arr=getTactics(selMap,selSide,selRound,selSubtype,selTitle);
  arr.splice(i,1);
  setTactics(selMap,selSide,selRound,selSubtype,selTitle,arr);
  renderTactics();
  saveToCloud(function(){saving=false;setSaving(false)});
}

function setSaving(active){
  var ind=document.getElementById("saving-indicator");
  var btn=document.getElementById("add-btn");
  if(active){ind.innerText="Kaydediliyor...";btn.disabled=true;}
  else{ind.innerText="Kaydedildi ✓";btn.disabled=false;setTimeout(function(){ind.innerText=""},2000);}
}

document.getElementById("new-tactic").addEventListener("keydown",function(e){if(e.key==="Enter")addTactic()});

// ─── Utils ──────────────────────────────────────────────
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escAttr(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;")}
</script>
</body>
</html>
